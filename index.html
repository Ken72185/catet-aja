<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RagilMoney Savings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .scroll-area { height: calc(100vh - 550px); overflow-y: auto; padding-bottom: 150px; }
        .scroll-area::-webkit-scrollbar { display: none; }
        .tab-active { background: #3b82f6; color: white; }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="flex flex-col">

    <div class="p-6 pt-8 pb-2">
        <div class="flex justify-between items-center opacity-40">
            <h1 class="text-xs font-black uppercase tracking-widest italic">💰 <span id="user-name-display">USER</span>MONEY</h1>
            <button onclick="togglePrivacy()" class="text-[10px] p-2 bg-white/5 rounded-full" id="eye-icon">👁️ TERLIHAT</button>
        </div>
        
        <div class="mt-4 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em]">Total Saldo</p>
            <h2 id="balance" class="text-4xl font-black mt-1 tracking-tighter transition-all">Rp 0</h2>
        </div>
    </div>

    <div class="px-6 mb-4">
        <div class="glass p-4 rounded-3xl">
            <div class="flex justify-between items-center mb-2">
                <span id="target-title" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">🎯 Target: Belum Diatur</span>
                <button onclick="setTarget()" class="text-[9px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded-lg">EDIT</button>
            </div>
            <div class="w-full bg-slate-900 rounded-full h-3 mb-2 overflow-hidden">
                <div id="target-progress" class="progress-bar bg-blue-500 h-full w-0 shadow-[0_0_10px_#3b82f6]"></div>
            </div>
            <div class="flex justify-between text-[9px] font-bold">
                <span id="progress-percent">0% Tercapai</span>
                <span id="target-value" class="text-gray-500 text-right">Target: Rp 0</span>
            </div>
        </div>
    </div>

    <div class="px-6 mb-4">
        <div class="glass p-3 rounded-2xl h-24 flex items-center justify-center">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="flex-1 px-6">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-[10px] text-gray-500 tracking-[0.2em]">RIWAYAT</h3>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="text-[9px] bg-green-600/20 text-green-500 px-3 py-1.5 rounded-full font-bold uppercase">Excel</button>
            </div>
        </div>
        <div id="list" class="scroll-area space-y-3"></div>
    </div>

    <div class="glass fixed bottom-0 left-0 right-0 p-6 pb-8 rounded-t-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.6)]">
        <div class="flex bg-slate-900/80 p-1 rounded-2xl mb-4">
            <button id="btn-pemasukan" onclick="setType('pemasukan')" class="flex-1 py-2 text-[10px] font-bold rounded-xl transition tab-active">PEMASUKAN</button>
            <button id="btn-pengeluaran" onclick="setType('pengeluaran')" class="flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500">PENGELUARAN</button>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="desc" placeholder="Keterangan..." class="flex-1 p-4 bg-slate-900/60 rounded-2xl border border-white/5 outline-none text-sm">
            <input type="number" id="amount" placeholder="Jumlah" class="w-1/3 p-4 bg-slate-900/60 rounded-2xl border border-white/5 outline-none text-sm">
        </div>
        <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xs tracking-widest uppercase">
            SIMPAN 🚀
        </button>
    </div>

    <script>
        let currentType = 'pemasukan';
        let isPrivate = false;
        let userName = localStorage.getItem('ragil_user_name') || "RAGIL";
        let transactions = JSON.parse(localStorage.getItem('ragil_money')) || [];
        let savingsTarget = JSON.parse(localStorage.getItem('ragil_target')) || { title: "Nabung", amount: 0 };
        let myChart;

        function setTarget() {
            let t = prompt("Apa target Tuan? (Contoh: Beli Ninja)", savingsTarget.title);
            let a = prompt("Berapa harganya? (Cukup angkanya saja)", savingsTarget.amount);
            if (t && a) {
                savingsTarget = { title: t, amount: parseInt(a) };
                localStorage.setItem('ragil_target', JSON.stringify(savingsTarget));
                updateDOM();
            }
        }

        function togglePrivacy() {
            isPrivate = !isPrivate;
            document.getElementById('eye-icon').innerText = isPrivate ? "🙈 TERSEMBUNYI" : "👁️ TERLIHAT";
            updateDOM();
        }

        function setType(type) {
            currentType = type;
            document.getElementById('btn-pemasukan').className = type === 'pemasukan' ? "flex-1 py-2 text-[10px] font-bold rounded-xl transition tab-active" : "flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500";
            document.getElementById('btn-pengeluaran').className = type === 'pengeluaran' ? "flex-1 py-2 text-[10px] font-bold rounded-xl transition bg-red-600 text-white" : "flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500";
        }

        function updateChart(inc, exp) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{ data: [inc, exp], backgroundColor: ['#3b82f6', '#ef4444'], borderWidth: 0, cutout: '75%' }]
                },
                options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });
        }

        function updateDOM() {
            const list = document.getElementById('list');
            const balanceDisplay = document.getElementById('balance');
            list.innerHTML = '';
            let total = 0, incTotal = 0, expTotal = 0;

            document.getElementById('user-name-display').innerText = userName.toUpperCase();

            transactions.forEach((t) => {
                if(t.type === 'pemasukan') { total += t.amount; incTotal += t.amount; }
                else { total -= t.amount; expTotal += t.amount; }
            });

            [...transactions].reverse().forEach((t, index) => {
                const isInc = t.type === 'pemasukan';
                const item = document.createElement('div');
                item.className = `glass p-4 rounded-2xl flex justify-between items-center animate-item`;
                item.innerHTML = `
                    <div class="flex flex-col"><span class="text-sm font-semibold">${t.desc}</span><span class="text-[9px] text-gray-500 font-bold uppercase">${t.date}</span></div>
                    <div class="flex items-center gap-4">
                        <span class="${isInc ? 'text-blue-400' : 'text-red-400'} font-bold text-sm">
                            ${isPrivate ? 'Rp •••••' : (isInc ? '+' : '-') + t.amount.toLocaleString('id-ID')}
                        </span>
                        <button onclick="deleteTransaction(${transactions.length - 1 - index})" class="text-gray-600 text-xs">✕</button>
                    </div>`;
                list.appendChild(item);
            });

            // Update Saldo & Privacy
            balanceDisplay.innerText = isPrivate ? "Rp ••••••••" : `Rp ${total.toLocaleString('id-ID')}`;
            balanceDisplay.style.color = total < 0 ? '#ef4444' : '#fff';

            // Update Progress Tabungan
            if (savingsTarget.amount > 0) {
                let percent = Math.floor((total / savingsTarget.amount) * 100);
                if (percent < 0) percent = 0;
                if (percent > 100) percent = 100;
                document.getElementById('target-title').innerText = `🎯 Target: ${savingsTarget.title}`;
                document.getElementById('target-value').innerText = `Goal: Rp ${savingsTarget.amount.toLocaleString('id-ID')}`;
                document.getElementById('target-progress').style.width = percent + '%';
                document.getElementById('progress-percent').innerText = `${percent}% Tercapai`;
                document.getElementById('progress-percent').style.color = percent >= 100 ? '#4ade80' : '#3b82f6';
            }

            localStorage.setItem('ragil_money', JSON.stringify(transactions));
            updateChart(incTotal, expTotal);
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            if (!desc || isNaN(amount)) return alert("Isi datanya, Tuan! 🥵");
            transactions.push({ desc, amount, date: new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'short'}), type: currentType });
            document.getElementById('desc').value = ''; document.getElementById('amount').value = '';
            updateDOM();
        }

        function deleteTransaction(i) { if(confirm("Hapus?")) { transactions.splice(i, 1); updateDOM(); } }
        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(transactions);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, `RagilMoney_${userName}.xlsx`);
        }

        updateDOM();
    </script>
</body>
</html>
