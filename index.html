<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RagilMoney Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .scroll-area { height: calc(100vh - 480px); overflow-y: auto; padding-bottom: 150px; }
        .scroll-area::-webkit-scrollbar { display: none; }
        .tab-active { background: #3b82f6; color: white; }
    </style>
</head>
<body class="flex flex-col">

    <div class="p-6 pt-8 pb-2">
        <div class="flex justify-between items-center opacity-40">
            <h1 class="text-xs font-black uppercase tracking-widest italic">💰 <span id="user-name-display">USER</span>MONEY</h1>
            <button onclick="togglePrivacy()" class="text-xs p-2 bg-white/5 rounded-full" id="eye-icon">👁️ Terlihat</button>
        </div>
        
        <div class="mt-4 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em]">Total Saldo</p>
            <h2 id="balance" class="text-4xl font-black mt-1 tracking-tighter">Rp 0</h2>
        </div>
    </div>

    <div class="px-6 mb-4">
        <div class="glass p-4 rounded-3xl h-32 flex items-center justify-center">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="flex-1 px-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-[10px] text-gray-500 tracking-[0.2em]">RIWAYAT</h3>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="text-[9px] bg-green-600/20 text-green-500 border border-green-500/30 px-3 py-1.5 rounded-full font-bold uppercase">Excel 📊</button>
                <button onclick="changeName()" class="text-[9px] bg-slate-800 text-gray-400 px-3 py-1.5 rounded-full font-bold uppercase">Nama ✏️</button>
            </div>
        </div>
        <div id="list" class="scroll-area space-y-3"></div>
    </div>

    <div class="glass fixed bottom-0 left-0 right-0 p-6 pb-8 rounded-t-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.6)]">
        <div class="flex bg-slate-900/80 p-1 rounded-2xl mb-4">
            <button id="btn-pemasukan" onclick="setType('pemasukan')" class="flex-1 py-2 text-[10px] font-bold rounded-xl transition tab-active">PEMASUKAN</button>
            <button id="btn-pengeluaran" onclick="setType('pengeluaran')" class="flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500">PENGELUARAN</button>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="desc" placeholder="Keterangan..." class="flex-1 p-4 bg-slate-900/60 rounded-2xl border border-white/5 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <input type="number" id="amount" placeholder="Jumlah" class="w-1/3 p-4 bg-slate-900/60 rounded-2xl border border-white/5 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xs tracking-widest uppercase">
            Simpan Transaksi 🚀
        </button>
    </div>

    <script>
        let currentType = 'pemasukan';
        let isPrivate = false;
        let userName = localStorage.getItem('ragil_user_name') || "RAGIL";
        let transactions = JSON.parse(localStorage.getItem('ragil_money')) || [];
        let myChart;

        function togglePrivacy() {
            isPrivate = !isPrivate;
            document.getElementById('eye-icon').innerText = isPrivate ? "🙈 Tersembunyi" : "👁️ Terlihat";
            updateDOM();
        }

        function setType(type) {
            currentType = type;
            document.getElementById('btn-pemasukan').className = type === 'pemasukan' ? "flex-1 py-2 text-[10px] font-bold rounded-xl transition tab-active" : "flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500";
            document.getElementById('btn-pengeluaran').className = type === 'pengeluaran' ? "flex-1 py-2 text-[10px] font-bold rounded-xl transition bg-red-600 text-white" : "flex-1 py-2 text-[10px] font-bold rounded-xl transition text-gray-500";
        }

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            let inc = transactions.filter(t => t.type === 'pemasukan').reduce((a, b) => a + b.amount, 0);
            let exp = transactions.filter(t => t.type === 'pengeluaran').reduce((a, b) => a + b.amount, 0);

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{
                        data: [inc, exp],
                        backgroundColor: ['#3b82f6', '#ef4444'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });
        }

        function updateDOM() {
            const list = document.getElementById('list');
            const balanceDisplay = document.getElementById('balance');
            list.innerHTML = '';
            let total = 0;

            document.getElementById('user-name-display').innerText = userName.toUpperCase();

            [...transactions].reverse().forEach((t, index) => {
                const isInc = t.type === 'pemasukan';
                total += isInc ? t.amount : -t.amount;
                const item = document.createElement('div');
                item.className = `glass p-4 rounded-2xl flex justify-between items-center opacity-80`;
                item.innerHTML = `
                    <div class="flex flex-col"><span class="text-sm font-semibold">${t.desc}</span><span class="text-[9px] text-gray-500 font-bold uppercase">${t.date}</span></div>
                    <div class="flex items-center gap-4">
                        <span class="${isInc ? 'text-blue-400' : 'text-red-400'} font-bold text-sm">
                            ${isPrivate ? 'Rp •••••' : (isInc ? '+' : '-') + t.amount.toLocaleString('id-ID')}
                        </span>
                        <button onclick="deleteTransaction(${transactions.length - 1 - index})" class="text-gray-600 text-xs">✕</button>
                    </div>`;
                list.appendChild(item);
            });

            balanceDisplay.innerText = isPrivate ? "Rp ••••••••" : `Rp ${total.toLocaleString('id-ID')}`;
            balanceDisplay.style.color = total < 0 ? '#ef4444' : '#fff';
            localStorage.setItem('ragil_money', JSON.stringify(transactions));
            updateChart();
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            if (!desc || isNaN(amount)) return alert("Isi datanya, Tuan! 🥵");
            transactions.push({ desc, amount, date: new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'short'}), type: currentType });
            document.getElementById('desc').value = ''; document.getElementById('amount').value = '';
            updateDOM();
        }

        function deleteTransaction(i) { if(confirm("Hapus?")) { transactions.splice(i, 1); updateDOM(); } }
        
        function changeName() { 
            let n = prompt("Ganti nama:", userName); 
            if(n) { userName = n; localStorage.setItem('ragil_user_name', n); updateNameDisplay(); } 
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(transactions);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, `RagilMoney_${userName}.xlsx`);
        }

        updateDOM();
    </script>
</body>
</html>
